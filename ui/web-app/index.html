<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Solden</title>
    <!-- Favicons in multiple sizes. All variants use Solden's
         architectural S-mark scaled to ~72% of the canvas so the glyph
         breathes inside the tab rather than filling edge-to-edge (the
         pre-v8 assets sat at ~91% fill and read oversized next to other
         tabs). v=8 cache-busts the re-padded assets. -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=8" />
    <link rel="icon" type="image/png" sizes="128x128" href="/favicon.png?v=8" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=7" />
    <link rel="preconnect" href="https://rsms.me" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Geist+Mono:wght@400;500;600&display=swap" />
    <link rel="stylesheet" href="/src/styles/base.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
