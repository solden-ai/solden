    <title>Solden</title>
    <!-- Favicons in multiple sizes. The 16/32 variants render a
         solid lowercase 's' (Inter Black) on a teal tile rather than
         the architectural S-mark — the three-bar mark is unreadable
         below 32px because anti-aliasing fills the sub-pixel gaps.
         Industry pattern: Stripe, Linear, Notion all ship simplified
         favicons distinct from their full lockups. v=4 cache-busts. -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=4" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=4" />
    <link rel="icon" type="image/png" sizes="128x128" href="/favicon.png?v=4" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=4" />
    <link rel="preconnect" href="https://rsms.me" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="stylesheet" href="/src/styles/base.css" />
  </head>

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
