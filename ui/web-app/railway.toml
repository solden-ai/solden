# Railway deployment configuration for the web-app service.
#
# This is the 5th Railway service in the Solden project, alongside
# api / worker / beat / redis. Static SPA + reverse proxy to the api
# service. Same-origin model: workspace.soldenai.com serves both the SPA
# and proxies /api, /auth, /v1, /extension, /erp, /portal, /slack,
# /teams, /outlook, /health to the api service. No CORS, no
# cookie-domain config required.
#
# Required env vars (set in the Railway service dashboard):
#   API_TARGET   — full URL of the api service. Use Railway's private
#                  network for low-latency: http://api.railway.internal:PORT
#                  Or fall back to the public URL: https://api.soldenai.com
#   PORT         — Railway-supplied; the server respects this.
#
# Optional:
#   PROXY_LOG=1  — verbose proxy logs (off by default)
#
# Custom domain: workspace.soldenai.com points here once the Railway-issued
# preview URL is confirmed working.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/healthz"
# 90s gives Railway's internal networking enough time to route the
# first probe to a freshly-started replica. The 30s default failed in
# deploy 34223a33 (2026-05-04 14:28) — the container was up and
# listening, but no probe reached it before Railway gave up at ~15s.
# Per Mo: "no HTTP requests reached the container during the
# 30-second window, even though the app started successfully."
healthcheckTimeout = 90
