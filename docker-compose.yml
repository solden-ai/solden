# Solden Development Stack
# Usage: docker-compose up -d

version: '3.8'

services:
  # Main API server
  api:
    build: .
    ports:
      - "8010:8010"
    environment:
      - CLEARLEDGR_PROCESS_ROLE=web
      - DATABASE_URL=postgresql://clearledgr:clearledgr@db:5432/clearledgr
      - REDIS_URL=redis://redis:6379/0
      - CLEARLEDGR_SECRET_KEY=${CLEARLEDGR_SECRET_KEY:-change-this-in-production}
      - LOG_LEVEL=info
      # ERP OAuth (set in .env)
      - QUICKBOOKS_CLIENT_ID=${QUICKBOOKS_CLIENT_ID:-}
      - QUICKBOOKS_CLIENT_SECRET=${QUICKBOOKS_CLIENT_SECRET:-}
      - XERO_CLIENT_ID=${XERO_CLIENT_ID:-}
      - XERO_CLIENT_SECRET=${XERO_CLIENT_SECRET:-}
      # Payment Gateways
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY:-}
      - FLUTTERWAVE_SECRET_KEY=${FLUTTERWAVE_SECRET_KEY:-}
      # LLM
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Notifications
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - TEAMS_APP_ID=${TEAMS_APP_ID:-}
      - TEAMS_APP_PASSWORD=${TEAMS_APP_PASSWORD:-}
      # AP runtime / durability truth-in-claims
      - AP_TEMPORAL_ENABLED=${AP_TEMPORAL_ENABLED:-false}
      - AP_TEMPORAL_REQUIRED=${AP_TEMPORAL_REQUIRED:-false}
      - AP_V1_STRICT_SURFACES=${AP_V1_STRICT_SURFACES:-true}
      - CLEARLEDGR_ENABLE_LEGACY_SURFACES=${CLEARLEDGR_ENABLE_LEGACY_SURFACES:-false}
      - AP_V1_ALLOW_LEGACY_SURFACES_IN_PRODUCTION=${AP_V1_ALLOW_LEGACY_SURFACES_IN_PRODUCTION:-false}
      - AP_AGENT_AUTONOMOUS_RETRY_ENABLED=${AP_AGENT_AUTONOMOUS_RETRY_ENABLED:-true}
      # Safe default for integration/pilot-style testing; set to true for local exploratory retry behavior.
      - AP_AGENT_NON_DURABLE_RETRY_ALLOWED=${AP_AGENT_NON_DURABLE_RETRY_ALLOWED:-false}
      - AP_BROWSER_RUNNER_TRUST_MODE=${AP_BROWSER_RUNNER_TRUST_MODE:-api_or_admin}
      # Gmail push verifier and OAuth state hardening
      - GMAIL_PUSH_SHARED_SECRET=${GMAIL_PUSH_SHARED_SECRET:-}
      - GMAIL_PUSH_ALLOW_UNVERIFIED_IN_PROD=${GMAIL_PUSH_ALLOW_UNVERIFIED_IN_PROD:-false}
      - GMAIL_OAUTH_STATE_MAX_AGE_SECONDS=${GMAIL_OAUTH_STATE_MAX_AGE_SECONDS:-900}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    command: ["celery", "-A", "clearledgr.services.celery_app", "worker", "-l", "info", "-c", "4"]
    environment:
      - CLEARLEDGR_PROCESS_ROLE=worker
      - DATABASE_URL=postgresql://clearledgr:clearledgr@db:5432/clearledgr
      - REDIS_URL=redis://redis:6379/0
      - CLEARLEDGR_SECRET_KEY=${CLEARLEDGR_SECRET_KEY:-change-this-in-production}
      - LOG_LEVEL=info
      - QUICKBOOKS_CLIENT_ID=${QUICKBOOKS_CLIENT_ID:-}
      - QUICKBOOKS_CLIENT_SECRET=${QUICKBOOKS_CLIENT_SECRET:-}
      - XERO_CLIENT_ID=${XERO_CLIENT_ID:-}
      - XERO_CLIENT_SECRET=${XERO_CLIENT_SECRET:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY:-}
      - FLUTTERWAVE_SECRET_KEY=${FLUTTERWAVE_SECRET_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - TEAMS_APP_ID=${TEAMS_APP_ID:-}
      - TEAMS_APP_PASSWORD=${TEAMS_APP_PASSWORD:-}
      - AP_TEMPORAL_ENABLED=${AP_TEMPORAL_ENABLED:-false}
      - AP_TEMPORAL_REQUIRED=${AP_TEMPORAL_REQUIRED:-false}
      - AP_V1_STRICT_SURFACES=${AP_V1_STRICT_SURFACES:-true}
      - CLEARLEDGR_ENABLE_LEGACY_SURFACES=${CLEARLEDGR_ENABLE_LEGACY_SURFACES:-false}
      - AP_V1_ALLOW_LEGACY_SURFACES_IN_PRODUCTION=${AP_V1_ALLOW_LEGACY_SURFACES_IN_PRODUCTION:-false}
      - AP_AGENT_AUTONOMOUS_RETRY_ENABLED=${AP_AGENT_AUTONOMOUS_RETRY_ENABLED:-true}
      - AP_AGENT_NON_DURABLE_RETRY_ALLOWED=${AP_AGENT_NON_DURABLE_RETRY_ALLOWED:-false}
      - AP_BROWSER_RUNNER_TRUST_MODE=${AP_BROWSER_RUNNER_TRUST_MODE:-api_or_admin}
      - GMAIL_PUSH_SHARED_SECRET=${GMAIL_PUSH_SHARED_SECRET:-}
      - GMAIL_PUSH_ALLOW_UNVERIFIED_IN_PROD=${GMAIL_PUSH_ALLOW_UNVERIFIED_IN_PROD:-false}
      - GMAIL_OAUTH_STATE_MAX_AGE_SECONDS=${GMAIL_OAUTH_STATE_MAX_AGE_SECONDS:-900}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Celery Beat scheduler (§11.2.1: timer_fired events)
  beat:
    build: .
    command: ["celery", "-A", "clearledgr.services.celery_app", "beat", "-l", "info"]
    environment:
      - DATABASE_URL=postgresql://clearledgr:clearledgr@db:5432/clearledgr
      - REDIS_URL=redis://redis:6379/0
      - CLEARLEDGR_SECRET_KEY=${CLEARLEDGR_SECRET_KEY:-change-this-in-production}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - redis
    restart: unless-stopped

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=clearledgr
      - POSTGRES_PASSWORD=clearledgr
      - POSTGRES_DB=clearledgr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    # Healthcheck gates api + worker startup so they don't race the
    # Postgres warmup. Without this the app hit a transient connection
    # error on fresh `docker-compose up` and then lazy-init recovered
    # — noisy logs, and a real problem if migrations run at boot.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearledgr -d clearledgr"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Webhook tunnel for development (ngrok alternative)
  # Exposes api to public internet for testing webhooks
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - api
    profiles:
      - tunnel  # Only start with: docker-compose --profile tunnel up

volumes:
  postgres_data:
  redis_data:
