name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

# Cancel in-flight runs for the same PR/branch when a new push lands —
# saves CI minutes and reflects the latest change instead of stale
# results.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Lint — fast, runs first to catch shape regressions before tests
  # ------------------------------------------------------------------
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.2.0"

      - name: Ruff check
        run: ruff check clearledgr/ tests/ main.py

  # ------------------------------------------------------------------
  # Backend tests — full pytest suite against a real Postgres service.
  # Parallel via pytest-xdist; coverage report uploaded as an artifact.
  # ------------------------------------------------------------------
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: clearledgr
          POSTGRES_PASSWORD: clearledgr
          POSTGRES_DB: clearledgr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clearledgr -d clearledgr_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      # Conftest reuses TEST_DATABASE_URL when set, skipping the
      # testcontainer spin-up. Service container is faster and we
      # don't need Docker-in-Docker.
      TEST_DATABASE_URL: postgresql://clearledgr:clearledgr@localhost:5432/clearledgr_test
      # Belt-and-suspenders: even if a code path tried to fall back
      # to SQLite, fail loudly instead of silently divergent test
      # behavior.
      CLEARLEDGR_DB_FALLBACK_SQLITE: "false"
      # The SAML / Fernet / JWT secrets are validated at import time
      # in some modules; stable test values keep the suite hermetic.
      TOKEN_ENCRYPTION_KEY: "ci-test-token-encryption-key-not-a-real-secret"
      JWT_SECRET_KEY: "ci-test-jwt-secret-not-a-real-secret"
      AP_V1_ALLOW_IN_MEMORY_RATE_LIMIT_IN_PRODUCTION: "true"
      CLEARLEDGR_SKIP_DEFERRED_STARTUP: "true"
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U clearledgr; then
              echo "Postgres is ready"; exit 0
            fi
            echo "Waiting for Postgres... ($i/30)"; sleep 1
          done
          echo "Postgres failed to come up"; exit 1

      - name: Pytest
        run: |
          python -m pytest tests/ \
            -n auto \
            --cov=clearledgr \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing:skip-covered \
            --junitxml=pytest-junit.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Upload pytest junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit
          path: pytest-junit.xml
          if-no-files-found: warn
          retention-days: 14

  # ------------------------------------------------------------------
  # Frontend — vitest component suite + node:test for the Gmail
  # extension. The browser-harness e2e tests stay in their dedicated
  # nightly workflow; this job exercises the unit/component layer.
  # ------------------------------------------------------------------
  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ui/gmail-extension
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/gmail-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      # The Gmail extension uses node:test (not vitest) as its actual
      # runner. `npm test` runs the .cjs integration tests under
      # tests/, `npm run test:components` runs the .js component
      # tests under src/. The browser-harness e2e tests stay in
      # gmail-runtime-smoke-nightly.yml.
      - name: Component tests (node:test)
        run: npm run test:components

      - name: Integration tests (node:test)
        run: npm test
