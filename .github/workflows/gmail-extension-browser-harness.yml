name: Gmail Extension Browser Harness

on:
  pull_request:
    paths:
      - "ui/gmail-extension/**"
      - ".github/workflows/gmail-extension-browser-harness.yml"
  push:
    branches:
      - "main"
      - "master"
      - "codex/**"
    paths:
      - "ui/gmail-extension/**"
      - ".github/workflows/gmail-extension-browser-harness.yml"

jobs:
  browser-harness:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: ui/gmail-extension
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/gmail-extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci

      - name: Build extension bundle and verify parity contract
        run: npm run build

      - name: Verify committed dist parity (strict)
        run: npm run verify:bundle:strict

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run integration contract tests
        run: npm run test:integration

      - name: Run deterministic browser harness
        run: npm run test:browser-harness:ci
