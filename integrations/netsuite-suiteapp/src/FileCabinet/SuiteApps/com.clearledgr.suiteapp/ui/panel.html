<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Solden</title>
    <!--CL_META-->
    <!--CL_CSS-->
</head>
<body>
    <div id="cl-root">
        <header class="cl-header">
            <div class="cl-brand">
                <span class="cl-mark"></span>
                <span class="cl-wordmark">solden</span>
            </div>
            <span id="cl-state-badge" class="cl-badge cl-badge-loading">Loading…</span>
        </header>

        <main id="cl-body">
            <section id="cl-summary" class="cl-section cl-hidden">
                <dl class="cl-grid">
                    <div><dt>Vendor</dt><dd id="cl-vendor">—</dd></div>
                    <div><dt>Amount</dt><dd id="cl-amount">—</dd></div>
                    <div><dt>Invoice #</dt><dd id="cl-invoice-number">—</dd></div>
                    <div><dt>Due</dt><dd id="cl-due-date">—</dd></div>
                </dl>
            </section>

            <section id="cl-memory" class="cl-section cl-hidden">
                <h3 class="cl-h3">Solden memory</h3>
                <dl class="cl-memory-grid">
                    <div><dt>Owner</dt><dd id="cl-owner">—</dd></div>
                    <div><dt>Waiting on</dt><dd id="cl-waiting-on">—</dd></div>
                    <div class="cl-memory-wide"><dt>Reason</dt><dd id="cl-waiting-reason">—</dd></div>
                    <div class="cl-memory-wide"><dt>Decision</dt><dd id="cl-decision">—</dd></div>
                    <div class="cl-memory-wide"><dt>Evidence</dt><dd id="cl-evidence">—</dd></div>
                    <div class="cl-memory-wide"><dt>Next step</dt><dd id="cl-next-step">—</dd></div>
                    <div><dt>Changed</dt><dd id="cl-changed">—</dd></div>
                    <div><dt>Audit trail</dt><dd><a id="cl-audit-link" href="#" target="_blank" rel="noopener">Open record</a></dd></div>
                </dl>
            </section>

            <section id="cl-exceptions-section" class="cl-section cl-hidden">
                <h3 class="cl-h3">Exceptions</h3>
                <ul id="cl-exceptions" class="cl-list"></ul>
            </section>

            <section id="cl-timeline-section" class="cl-section cl-hidden">
                <h3 class="cl-h3">Timeline</h3>
                <ol id="cl-timeline" class="cl-timeline"></ol>
            </section>

            <section id="cl-actions" class="cl-section cl-actions cl-hidden">
                <button class="cl-btn cl-btn-primary" data-action="approve">Approve</button>
                <button class="cl-btn cl-btn-ghost" data-action="reject">Reject</button>
                <button class="cl-btn cl-btn-ghost" data-action="needs_info">Request info</button>
            </section>

            <!-- High-signal elicitation (tribal-knowledge Build 2): the backend
                 blocks an unusual action with ONE contextual question; answer
                 it here and the action retries with the rationale. -->
            <section id="cl-elicit" class="cl-section cl-elicit cl-hidden">
                <p class="cl-elicit-question" id="cl-elicit-question"></p>
                <textarea id="cl-elicit-reason" class="cl-elicit-reason" rows="3"
                          placeholder="Why is this OK?"></textarea>
                <div class="cl-actions">
                    <button class="cl-btn cl-btn-primary" id="cl-elicit-submit">Submit</button>
                    <button class="cl-btn cl-btn-ghost" id="cl-elicit-cancel">Cancel</button>
                </div>
            </section>

            <section id="cl-empty" class="cl-section cl-empty cl-hidden">
                <p class="cl-muted">This bill was not processed through Solden.</p>
            </section>

            <section id="cl-error" class="cl-section cl-error cl-hidden">
                <p class="cl-error-text" id="cl-error-text">Something went wrong.</p>
                <button class="cl-btn cl-btn-ghost" data-action="retry">Retry</button>
            </section>
        </main>

        <footer class="cl-footer">
            <span class="cl-muted" id="cl-deeplink-host">
                <a id="cl-deeplink" href="#" target="_blank" rel="noopener">Open in Solden →</a>
            </span>
        </footer>
    </div>
    <!--CL_JS-->
</body>
</html>
