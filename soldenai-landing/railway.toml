# Railway deployment for the Solden marketing site.
#
# Static site at soldenai.com. Separate from the workspace SPA at
# workspace.clearledgr.com — this site doesn't proxy any API. Custom
# domain attached to this service in the Railway dashboard.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/healthz"
# 90s window — internal-routing settling on cold deploys (same
# rationale as the workspace service after the 14:28 UTC incident).
healthcheckTimeout = 90
